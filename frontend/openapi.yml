openapi: "3.0.3"

info:
  title: "Tasks API"
  version: "1.0.0"

servers:
  - url: http://localhost:3001
    description: Development server

paths:
  "/tasks":
    get:
      summary: "全てのタスクを表示"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: array
                example: 
                  - id: 1
                    title: task1
                    status: "not_started"
                  - id: 2
                    title: task2
                    status: "completed"
                  - id: 3
                    title: task3
                    status: "not_started"
                  - id: 4
                    title: task4
                    status: "not_started"
                  - id: 5
                    title: task5
                    status: "not_started"
                  - id: 6
                    title: task6
                    status: "not_started"
                  - id: 7
                    title: task7
                    status: "not_started"
                  - id: 8
                    title: task8
                    status: "in_progress"
                  - id: 9
                    title: task9
                    status: "not_started"
                  - id: 10
                    title: task10
                    status: "completed"
    post:
      summary: "タスクの生成"
      requestBody: 
        description: user to create
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              title: newTask
      responses:
        "201":
          description: "成功"
          content:
            application/json:
              schema:
                type: object
                example: 
                  id: 3
                  title: newTask
                  status: "not_started"
  "/tasks/{id}": 
    patch:
      summary: "タスクの状態を更新"
      parameters:
        - name: id
          in: path
          required: true
          schema: 
            type: integer
          example: 1
      requestBody: 
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              status: in_progress
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                status:
                  type: string
                  enum: ["not_started", "in_progress", "completed"]
                example: 
                  id: 1
                  title: task1
                  status: "in_progress"
    delete:
      summary: "タスクの削除"
      parameters:
        - name: id
          in: path
          required: true
          schema: 
            type: number
          example: "1"
      responses:
        "200":
          description: "成功"
          

                  
